<div class="wheel-weight-calculator">

<h2>Wheelset Weights</h2>

<div class="selectors">

<label>
Series
<select id="series"></select>
</label>

<label>
Rim
<select id="rim"></select>
</label>

<label>
Size
<select id="size"></select>
</label>

<label>
Brake Mount
<select id="brake"></select>
</label>

</div>

<div class="weights">

<div>
<span class="label">Complete</span>
<span id="completeWeight">--</span> g
</div>

<div>
<span class="label">Front</span>
<span id="frontWeight">--</span> g
</div>

<div>
<span class="label">Rear</span>
<span id="rearWeight">--</span> g
</div>

<div class="comparison">
<h3>Rim Comparison</h3>
<div id="comparisonBars"></div>
</div>

</div>

</div>


<style>

.wheel-weight-calculator{
max-width:1200px;
margin:auto;
}

.selectors{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
margin-bottom:24px;
}

label{
display:flex;
flex-direction:column;
font-size:14px;
}

select{
padding:8px;
font-size:16px;
}

.weights{
display:flex;
justify-content:space-between;
font-size:20px;
font-weight:600;
text-align:center;
}

.weights .label{
display:block;
font-size:14px;
font-weight:400;
color:#666;
}

.comparison{
margin-top:24px;
}

.comparison h3{
font-size:16px;
margin:0 0 12px;
}

#comparisonBars{
display:flex;
flex-direction:column;
gap:10px;
}

.bar-row{
display:grid;
grid-template-columns:90px 1fr 60px;
align-items:center;
gap:10px;
font-size:14px;
}

.bar-label{
font-weight:600;
}

.bar-track{
width:100%;
height:12px;
background:#ececec;
border-radius:999px;
overflow:hidden;
}

.bar-fill{
height:100%;
width:0%;
background:#222;
border-radius:999px;
}

.bar-value{
text-align:right;
font-weight:600;
}

</style>


<script>

let data = []

const selection = {
series: null,
rim: null,
size: null,
brake: null
}

const seriesSelect = document.getElementById("series")
const rimSelect = document.getElementById("rim")
const sizeSelect = document.getElementById("size")
const brakeSelect = document.getElementById("brake")

const completeEl = document.getElementById("completeWeight")
const frontEl = document.getElementById("frontWeight")
const rearEl = document.getElementById("rearWeight")
const comparisonBarsEl = document.getElementById("comparisonBars")


/*
Load JSON file
Replace with your actual URL
*/

fetch("https://nobl-local.staging/wp-content/uploads/2026/03/WheelsetWeights.json")
.then(res => res.json())
.then(json => {

data = json

init()

})


function init(){

populateSeries()
populateRims()
updateOptions()
updateWeights()
updateComparisonBars()

seriesSelect.addEventListener("change",handleSeriesChange)
rimSelect.addEventListener("change",handleRimChange)
sizeSelect.addEventListener("change",handleSizeChange)
brakeSelect.addEventListener("change",handleBrakeChange)

}

function populateSeries(){

const series = [...new Set(data.map(d => d["Series"]))]

seriesSelect.innerHTML = series
.map(s => `<option value="${s}">${s}</option>`)
.join("")

selection.series = series[0]

}



function populateRims(){

const previousRim = selection.rim

const rims = [...new Set(
  data
    .filter(d => d["Series"] === selection.series)
    .map(d => d["Rim"])
)]

rimSelect.innerHTML = rims
.map(r => `<option value="${r}">${r}</option>`)
.join("")

selection.rim = rims.includes(previousRim) ? previousRim : (rims[0] ?? null)
rimSelect.value = selection.rim ?? ""
}


function handleSeriesChange(){

selection.series = seriesSelect.value

populateRims()
updateOptions()
updateWeights()

}

function handleRimChange(){

selection.rim = rimSelect.value
updateOptions()
updateWeights()

}

function handleSizeChange(){

selection.size = sizeSelect.value
updateOptions()
updateWeights()

}

function handleBrakeChange(){

selection.brake = brakeSelect.value
updateWeights()

}


function updateOptions(){

const rimData = data.filter(d =>
  d["Series"] === selection.series &&
  d["Rim"] === selection.rim
)

const sizes = [...new Set(rimData.map(d => d["Rim Sizes"]))]

sizeSelect.innerHTML = sizes
.map(s => `<option value="${s}">${s}</option>`)
.join("")

selection.size = sizes.includes(selection.size) ? selection.size : (sizes[0] ?? null)
sizeSelect.value = selection.size ?? ""

const brakeOptions = rimData
.filter(d => d["Rim Sizes"] === selection.size)
.map(d => d["Brake Mount"])

const brakes = [...new Set(brakeOptions)]

brakeSelect.innerHTML = brakes
.map(b => `<option value="${b}">${b}</option>`)
.join("")

selection.brake = brakes.includes(selection.brake) ? selection.brake : (brakes[0] ?? null)
brakeSelect.value = selection.brake ?? ""

}


function updateWeights(){

const match = data.find(d =>
  d["Series"] === selection.series &&
  d["Rim"] === selection.rim &&
  d["Rim Sizes"] === selection.size &&
  d["Brake Mount"] === selection.brake
)

if(!match){

completeEl.textContent="--"
frontEl.textContent="--"
rearEl.textContent="--"
updateComparisonBars()

return

}

completeEl.textContent = match["Wheelset weight (g)"]
frontEl.textContent = match["Front Weight (g)"]
rearEl.textContent = match["Rear Weight (g)"]
updateComparisonBars()

}

function toNumber(value){

if(typeof value === "number") return value
if(typeof value === "string") return Number(value.replace(/[^\d.]/g, ""))
return NaN

}

function updateComparisonBars(){

const filteredData = data.filter(d =>
  d["Series"] === selection.series &&
  d["Rim Sizes"] === selection.size &&
  d["Brake Mount"] === selection.brake
)

const rimNames = [...new Set(filteredData.map(d => d["Rim"]))]

const rows = rimNames
.map(rimName => {
  const rimRows = filteredData.filter(d => d["Rim"] === rimName)

  const numericWeights = rimRows
    .map(d => toNumber(d["Wheelset weight (g)"]))
    .filter(item => Number.isFinite(item))

  if(!numericWeights.length) return null

  const lightest = Math.min(...numericWeights)

  return {
    rim: rimName,
    weight: lightest,
    label: `${Math.round(lightest)}g`
  }
})
.filter(Boolean)
.sort((a, b) => a.weight - b.weight)

if(!rows.length){
  comparisonBarsEl.innerHTML = ""
  return
}

const maxWeight = Math.max(...rows.map(r => r.weight))

comparisonBarsEl.innerHTML = rows
.map(r => {
  const percent = maxWeight > 0 ? Math.max(8, (r.weight / maxWeight) * 100) : 0
  return `
    <div class="bar-row">
      <span class="bar-label">${r.rim}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${percent}%"></div></div>
      <span class="bar-value">${r.label}</span>
    </div>
  `
})
.join("")

}

</script>
